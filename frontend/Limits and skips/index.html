<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h1>Users List</h1>

    <!-- Add User Form -->
    <form id="userForm">

      <input type="text" id="name" placeholder="Search by Name" required />

      <input type="number" id="MinAge" placeholder="Min age required " />

      <input type="number" id="MaxAge" placeholder="Max age" required />

      <select name="sort by age" id="sort">
        <option >Sort by age</option>
        <option value="Ascending">Ascending</option>
        <option value="Decending">Decending</option>
      </select>

      <button type="submit">Apply</button>

    </form>

    <!-- Users -->
    <div id="usersContainer"></div>

  </div>

  <script src="app.js"></script>
</body>

</html>
